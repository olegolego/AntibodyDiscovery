id: sequence_input
name: Sequence Input
version: "1.1.0"
category: input
icon: ""
description: >
  Starting node for antibody/nanobody design pipelines. Provide a heavy chain (VH/VHH)
  and optionally a light chain (VL). Outputs connect directly to ImmuneBuilder or other
  structure/sequence design tools.

inputs:
  - name: heavy_chain
    type: fasta
    required: true
    default: "EVQLVESGGGLVQPGGSLRLSCAASGFNIKDTYIHWVRQAPGKGLEWVARIYPTNGYTRYADSVKGRFTISADTSKNTAYLQMNSLRAEDTAVYYCSRWGGDGFYAMDYWGQGTLVTVSS"
    description: VH or VHH sequence (single-letter AA, no FASTA header)
  - name: light_chain
    type: fasta
    required: false
    default: "DIQMTQSPSSLSASVGDRVTITCRASQDVNTAVAWYQQKPGKAPKLLIYSASFLYSGVPSRFSGSRSGTDFTLTISSLQPEDFATYYCQQHYTTPPTFGQGTKVEIK"
    description: VL sequence for full antibody. Leave empty for nanobody.

outputs:
  - name: heavy_chain
    type: fasta
    description: Heavy chain sequence passed downstream
  - name: light_chain
    type: fasta
    description: Light chain sequence passed downstream

runtime:
  kind: local_python
  endpoint_env: ""
  gpu: false
  timeout_seconds: 5
